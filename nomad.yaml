keycloak:
  realm_name: fairdi_nomad_test

services:
  mode: development
  admin_user_id: a02f4eb7-2243-4821-8abc-c87936b6da7b
  # console_log_level: 30


rfc3161_timestamp:
  server: http://timestamp.acs.microsoft.com

plugins:
  exclude:
    # - nomad_measurements.xrd:parser_entry_point  # For DTU Plugin testing
    # - nomad_measurements.transmission:parser_entry_point  # For IKZ plugin testing
  entry_points:
    options:
      nomad_measurements.xrd:schema_entry_point:
        use_hdf5_results: false
      nomad_ml_workflows.actions:export_entries:
        search_batch_timeout: 60  # in seconds
        max_entries_export_limit: 10000  # maximum number of entries to export; set to 0 for no limit


temporal:
  enabled: true